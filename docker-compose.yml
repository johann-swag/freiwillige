version: "3.9"

# ============================================================
# Freiwillig — Full Stack
# All MIT/Apache 2.0 licensed — commercially safe
# ============================================================
#
# Services:
#   api          FastAPI backend
#   worker       Celery background tasks
#   frontend     Next.js
#   postgres     PostgreSQL 16
#   valkey       Redis-compatible (MIT)
#   garage       S3-compatible object storage (MIT)
#   zitadel      Auth / IAM (Apache 2.0)
#   traefik      API Gateway + reverse proxy (MIT)
#   mailpit      Mail catcher for dev
#   signoz       Observability (MIT)
#
# Deploy: docker compose up -d
# ============================================================

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

volumes:
  postgres_data:
  valkey_data:
  garage_data:
  zitadel_data:
  signoz_data:

services:

  # ──────────────────────────────────────────────────────────
  # TRAEFIK — API Gateway + Reverse Proxy
  # Dashboard: http://localhost:8080
  # ──────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--metrics.prometheus=true"
      - "--accesslog=true"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infrastructure/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks: [public, internal]

  # ──────────────────────────────────────────────────────────
  # POSTGRESQL — Main database
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: freiwillig
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: freiwillig
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freiwillig"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # VALKEY — Redis-compatible (MIT license)
  # ──────────────────────────────────────────────────────────
  valkey:
    image: valkey/valkey:7.2-alpine
    container_name: valkey
    restart: unless-stopped
    command: valkey-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - valkey_data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # FASTAPI — Backend API
  # Docs: http://localhost:8000/docs (dev only)
  # ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://freiwillig:${POSTGRES_PASSWORD}@postgres:5432/freiwillig
      VALKEY_URL: redis://valkey:6379/0
    volumes:
      - ./backend:/app  # hot reload in dev
    ports:
      - "8000:8000"
    networks: [internal, public]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.freiwillig.local`)"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # ──────────────────────────────────────────────────────────
  # CELERY WORKER — Background tasks
  # ──────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://freiwillig:${POSTGRES_PASSWORD}@postgres:5432/freiwillig
      VALKEY_URL: redis://valkey:6379/0
    volumes:
      - ./backend:/app
    networks: [internal]

  # ──────────────────────────────────────────────────────────
  # NEXT.JS FRONTEND
  # URL: http://localhost:3000
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
      NEXT_PUBLIC_ZITADEL_URL: http://zitadel:8081
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks: [internal, public]

  # ──────────────────────────────────────────────────────────
  # ZITADEL — Auth / IAM (Apache 2.0)
  # URL: http://localhost:8081
  # ──────────────────────────────────────────────────────────
  zitadel:
    image: ghcr.io/zitadel/zitadel:stable
    container_name: zitadel
    restart: unless-stopped
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY}" --tlsMode disabled
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: freiwillig
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: 8081
      ZITADEL_EXTERNALDOMAIN: localhost
    ports:
      - "8081:8080"
    volumes:
      - zitadel_data:/data
    networks: [internal, public]

  # ──────────────────────────────────────────────────────────
  # GARAGE — S3-compatible storage (MIT)
  # API: http://localhost:3900
  # ──────────────────────────────────────────────────────────
  garage:
    image: dxflrs/garage:v1.0
    container_name: garage
    restart: unless-stopped
    environment:
      GARAGE_METADATA_DIR: /var/lib/garage/meta
      GARAGE_DATA_DIR: /var/lib/garage/data
    volumes:
      - garage_data:/var/lib/garage
      - ./infrastructure/docker/garage/garage.toml:/etc/garage.toml:ro
    ports:
      - "3900:3900"  # S3 API
      - "3902:3902"  # Admin API
    networks: [internal]

  # ──────────────────────────────────────────────────────────
  # MAILPIT — Mail catcher (dev only)
  # UI: http://localhost:8025
  # ──────────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks: [internal]

  # ──────────────────────────────────────────────────────────
  # SIGNOZ — Observability: Metrics + Traces + Logs (MIT)
  # UI: http://localhost:3301
  # ──────────────────────────────────────────────────────────
  signoz-otel-collector:
    image: signoz/signoz-otel-collector:latest
    container_name: signoz-otel-collector
    restart: unless-stopped
    volumes:
      - ./infrastructure/signoz/otel-collector-config.yaml:/etc/otel/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks: [internal]
