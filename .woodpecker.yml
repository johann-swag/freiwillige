# ============================================================
# Woodpecker CI Pipeline
# Apache 2.0 — commercially safe
# ============================================================
# Triggers:
#   push to main    → test → build → deploy staging
#   tag v*.*.*      → test → build → deploy production
#   pull request    → test only
# ============================================================

when:
  - event: [push, pull_request, tag]

variables:
  - &image_api "registry.freiwillig.internal/api"
  - &image_frontend "registry.freiwillig.internal/frontend"

steps:

  # ── 1. BACKEND TESTS ────────────────────────────────────────────────────────
  - name: backend-lint
    image: python:3.12-slim
    commands:
      - pip install ruff mypy --quiet
      - ruff check backend/
      - mypy backend/app --ignore-missing-imports
    when:
      - event: [push, pull_request]

  - name: backend-test
    image: python:3.12-slim
    environment:
      DATABASE_URL: postgresql+asyncpg://freiwillig:test@postgres-test:5432/freiwillig_test
      VALKEY_URL: redis://valkey-test:6379/0
      SECRET_KEY: test_secret_key_at_least_32_characters_long
      ENV: testing
    commands:
      - cd backend
      - pip install -r requirements.txt --quiet
      - pytest tests/ -v --cov=app --cov-report=xml --cov-fail-under=80
    when:
      - event: [push, pull_request]

  # ── 2. FRONTEND TESTS ───────────────────────────────────────────────────────
  - name: frontend-lint
    image: node:20-alpine
    commands:
      - cd frontend
      - npm ci --silent
      - npm run lint
      - npm run type-check
    when:
      - event: [push, pull_request]

  - name: frontend-test
    image: node:20-alpine
    commands:
      - cd frontend
      - npm ci --silent
      - npm run test -- --passWithNoTests
    when:
      - event: [push, pull_request]

  # ── 3. SECURITY SCAN ────────────────────────────────────────────────────────
  - name: security-scan
    image: aquasec/trivy:latest
    commands:
      - trivy fs --exit-code 1 --severity HIGH,CRITICAL --no-progress .
    when:
      - event: push
        branch: main

  # ── 4. BUILD & PUSH ─────────────────────────────────────────────────────────
  - name: build-api
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: registry.freiwillig.internal
      repo: *image_api
      tags:
        - ${CI_COMMIT_SHA:0:8}
        - latest
      dockerfile: backend/Dockerfile
      context: backend/
      cache_from: *image_api
    secrets: [docker_username, docker_password]
    when:
      - event: push
        branch: main

  - name: build-frontend
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: registry.freiwillig.internal
      repo: *image_frontend
      tags:
        - ${CI_COMMIT_SHA:0:8}
        - latest
      dockerfile: frontend/Dockerfile
      context: frontend/
    secrets: [docker_username, docker_password]
    when:
      - event: push
        branch: main

  # ── 5. DEPLOY STAGING ───────────────────────────────────────────────────────
  - name: deploy-staging
    image: alpine/ssh
    environment:
      DEPLOY_HOST: staging.freiwillig.internal
      IMAGE_TAG: ${CI_COMMIT_SHA:0:8}
    secrets: [deploy_ssh_key]
    commands:
      - mkdir -p ~/.ssh
      - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - |
        ssh -o StrictHostKeyChecking=no deploy@$DEPLOY_HOST "
          cd /opt/freiwillig &&
          export IMAGE_TAG=$IMAGE_TAG &&
          docker compose pull &&
          docker compose up -d --no-deps api worker frontend &&
          docker compose exec api alembic upgrade head
        "
    when:
      - event: push
        branch: main

  # ── 6. SMOKE TEST STAGING ───────────────────────────────────────────────────
  - name: smoke-test-staging
    image: curlimages/curl
    commands:
      - sleep 10
      - curl -f https://staging.freiwillig.internal/health || exit 1
      - curl -f https://staging.freiwillig.internal/api/v1/docs || exit 1
    when:
      - event: push
        branch: main

  # ── 7. DEPLOY PRODUCTION (tag only) ─────────────────────────────────────────
  - name: deploy-production
    image: alpine/ssh
    environment:
      DEPLOY_HOST: prod.freiwillig.internal
      IMAGE_TAG: ${CI_COMMIT_TAG}
    secrets: [deploy_ssh_key_prod]
    commands:
      - mkdir -p ~/.ssh
      - echo "$DEPLOY_SSH_KEY_PROD" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - |
        ssh -o StrictHostKeyChecking=no deploy@$DEPLOY_HOST "
          cd /opt/freiwillig &&
          export IMAGE_TAG=$IMAGE_TAG &&
          docker compose pull &&
          docker compose up -d --no-deps api worker frontend &&
          docker compose exec api alembic upgrade head
        "
    when:
      - event: tag
        ref: refs/tags/v*

# ── TEST SERVICES (available during pipeline) ─────────────────────────────────
services:
  - name: postgres-test
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freiwillig
      POSTGRES_PASSWORD: test
      POSTGRES_DB: freiwillig_test

  - name: valkey-test
    image: valkey/valkey:7.2-alpine
